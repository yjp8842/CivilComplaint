server:
  port: 8080

logging:
  level:
    com.civil: DEBUG

jwt:
  secret: civil-complaint-jwt-secret-key-for-dev-only-min-32bytes

spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/civil_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update       # 개발 중엔 update, 운영은 none
    show-sql: true           # SQL 로그 확인
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
